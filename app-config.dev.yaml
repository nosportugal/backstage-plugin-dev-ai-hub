app:
  title: Dev AI Hub
  baseUrl: http://localhost:3000

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

devAiHub:
  providers:
    - id: backstage-test-01
      type: github
      target: https://github.com/nosportugal/backstage-test-01.git
      branch: main
      schedule:
        frequency:
          minutes: 60
        timeout:
          minutes: 5
    - id: flai-ai-dev-coe-toolkit
      type: github
      target: https://github.com/nosportugal/flai-ai-dev-coe-toolkit.git
      branch: main
      schedule:
        frequency:
          minutes: 60
        timeout:
          minutes: 5


# GitHub integration — required for the sync to fetch files
integrations:
  github:
    - host: github.com
      apps:
        - appId: ${GITHUB_APP_ID}
          clientId: ${GITHUB_CLIENT_ID}
          clientSecret: ${GITHUB_CLIENT_SECRET}
          privateKey: ${GITHUB_PRIVATE_KEY}
          allowedInstallationOwners:
            - nosportugal
