name: CI

on:
  push:
    branches: [main, main-nos]
  pull_request:
    branches: [main, main-nos]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0 # v6.3.0
        with:
          node-version: "24"

      - name: Enable Corepack & activate Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install

      - name: Type-check
        run: yarn tsc

      - name: Lint
        run: yarn lint:all

      - name: Build
        run: yarn build:all
